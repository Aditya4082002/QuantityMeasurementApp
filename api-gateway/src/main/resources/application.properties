spring.application.name=api-gateway
server.port=${PORT:8765}

# Keep Eureka (optional)
eureka.client.service-url.defaultZone=${EUREKA_URL}

# ? Disable discovery-based routing
spring.cloud.gateway.discovery.locator.enabled=false

# ? Use direct URLs
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=https://auth-service-qma.up.railway.app
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=oauth
spring.cloud.gateway.routes[1].uri=https://auth-service-qma.up.railway.app
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**
#spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=login
spring.cloud.gateway.routes[2].uri=https://auth-service-qma.up.railway.app
spring.cloud.gateway.routes[2].predicates[0]=Path=/login/**
#spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=qma-service
spring.cloud.gateway.routes[3].uri=https://qma-services-qma.up.railway.app
spring.cloud.gateway.routes[3].predicates[0]=Path=/qma-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*


